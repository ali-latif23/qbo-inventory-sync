<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — QBO Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2330;
      --accent: #2dd4bf;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: default; }
    .error {
      color: var(--red);
      font-size: 12px;
      margin-top: 14px;
      min-height: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">QBO Inventory Sync</div>
  <h1>Sign in</h1>
  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@company.com" autocomplete="username" />
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  <button id="btn" onclick="doLogin()">Sign In</button>
  <div class="error" id="err"></div>
</div>

<script>
  // Show errors passed via query param (from requireAuth redirects)
  const qp = new URLSearchParams(window.location.search);
  if (qp.get('error') === 'profile_missing') {
    document.getElementById('err').textContent = 'Account not fully set up. Contact your administrator.';
  }
  if (qp.get('error') === 'forbidden') {
    document.getElementById('err').textContent = 'You do not have access to that page.';
  }

  // If already signed in, redirect immediately without showing the form
  (async function () {
    const { data: { session } } = await window._supabaseClient.auth.getSession();
    if (session) redirectByRole(session);
  })();

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn');
    const errEl    = document.getElementById('err');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Email and password are required.'; return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    const { data, error } = await window._supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = error.message;
      btn.disabled    = false;
      btn.textContent = 'Sign In';
      return;
    }

    redirectByRole(data.session);
  }

  async function redirectByRole(session) {
    // Honour ?redirect= if requireAuth sent us here from a specific page
    const redirectTo = new URLSearchParams(window.location.search).get('redirect');
    if (redirectTo) { window.location.replace(redirectTo); return; }

    // Otherwise route by role
    const { data: profile } = await window._supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', session.user.id)
      .single();

    const map = { admin: '/', proclean: '/proclean.html', production: '/production' };
    window.location.replace(map[profile && profile.role] || '/');
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
